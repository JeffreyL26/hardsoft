// Zeichen: . leer | # Boden | R Stein | = Baumstamm (niedrig)

//          s Salat | * Sanduhr-Splitter | P Start
//          c Kraehen-Wache | z schlafende Kraehe | B Mini-Boss | Z Kaefig (Zip)
// ============================================================
const d = n => '.'.repeat(n), G = n => '#'.repeat(n);
function seg(name, w, rows, h){
  h = h || 12;
  const out = { name, w, rows: [] };
  for(let r = 0; r < h; r++){
    let s = rows[r] || '';
    if(s.length > w) throw new Error('Segment "'+name+'" Zeile '+r+' zu lang ('+s.length+' > '+w+')');
    out.rows.push(s + d(w - s.length));
  }
  return out;
}

let curWorld = 0, curLvl = 0, selW = 0, selL = 0;
// In-Memory-Fortschritt (kein localStorage): done + beste Splitter-Zahl je Level
const prog = WORLDS.map(w => w.levels.map(() => ({done:false, best:0})));
const seenIntro = WORLDS.map(() => false);
function isUnlocked(w, l){
  if(l > 0) return prog[w][l-1].done;
  if(w === 0) return true;
  const pw = prog[w-1];
  return pw[pw.length-1].done;
}
function worldDone(w){ return prog[w].every(p => p.done); }
function markDone(){
  const p = prog[curWorld][curLvl];
  p.done = true;
  p.best = Math.max(p.best, shardCount);
}

// Tile-Codes
const T_EMPTY=0, T_GROUND=1, T_ROCK=2, T_LOG=3, T_RAMP_UP=4, T_RAMP_DN=5, T_DOOR=6, T_SHROOM=7, T_ICE=8;
const CHAR2TILE = { '#':T_GROUND, 'R':T_ROCK, '=':T_LOG, '/':T_RAMP_UP, '\\':T_RAMP_DN, 'D':T_DOOR, 'M':T_SHROOM, 'I':T_ICE };
// Pilz ist seitlich solide (= Kickturn-Wand), Landung federt aber (Y-Resolve)
const isSolid = t => t===T_GROUND || t===T_ROCK || t===T_LOG || t===T_DOOR || t===T_SHROOM || t===T_ICE;

let MAPW = 0, grid = [], vgrid = [], SEGOFF = {};
let spawns = [];          // Gegner-Spawn-Beschreibungen
let collectibles = [];    // Salat + Splitter (persistieren ueber Respawn)
let cage = null, goal = null, playerStart = {x:32,y:120};
let checkpoint = null;    // {x, y, active, animT} – nur im Speicher
let totalSalad = 0, totalShards = 0;

const hash = n => { let h = (n*2654435761)>>>0; h ^= h>>13; return (h*2246822519)>>>0; };

function buildLevel(){
  const L = WORLDS[curWorld].levels[curLvl];
  MAPH = L.maph;
  MAPW = L.segs.reduce((a,s)=>a+s.w, 0);
  grid = []; for(let r=0;r<MAPH;r++) grid.push(new Array(MAPW).fill(0));
  spawns = []; collectibles = []; cage = null; goal = null;
  totalSalad = 0; totalShards = 0;
  let off = 0; SEGOFF = {};
  for(const s of L.segs){
    SEGOFF[s.name] = off;
    for(let r=0;r<MAPH;r++){
      for(let i=0;i<s.w;i++){
        const ch = s.rows[r][i], c = off+i;
        const x = c*TILE, groundY = (r+1)*TILE; // Unterkante der Zelle
        if(ch==='P'){ playerStart = {x:x, y:groundY - 19}; }
        else if(ch==='s'){ collectibles.push({kind:'salad', x:x+5, y:r*TILE+5, w:7, h:7, got:false}); totalSalad++; }
        else if(ch==='*'){ collectibles.push({kind:'shard', x:x+5, y:r*TILE+3, w:7, h:11, got:false}); totalShards++; }
        else if(ch==='c'){ spawns.push({type:'guard', x:x+1, y:groundY-14}); }
        else if(ch==='z'){ spawns.push({type:'sleeper', x:x+1, y:groundY-13}); }
        else if(ch==='B'){ spawns.push({type:'boss', x:x-4, y:groundY-22, doorX:(off+26)*TILE}); }
        else if(ch==='Z'){ cage = {x:x-3, y:groundY-30, w:22, h:30, open:false}; }
        else if(ch==='F'){ goal = {x:x+2, y:groundY-44, w:12, h:44, reached:false}; }
        else if(CHAR2TILE[ch] !== undefined) grid[r][c] = CHAR2TILE[ch];
      }
    }
    off += s.w;
  }
  // Optionaler Checkpoint (Fahnenmast) pro Level, Position aus der Level-Definition.
  // dir wird beim Aktivieren gemerkt (Etagen-Level: Respawn in Fahrtrichtung).
  checkpoint = L.checkpoint
    ? { x:(SEGOFF[L.checkpoint.seg]+L.checkpoint.col)*TILE, y:L.checkpoint.gy,
        active:false, animT:0, dir:1 }
    : null;
  computeVGrid();
}

function tileAt(c, r){
  if(c < 0 || c >= MAPW) return T_GROUND;   // Levelraender sind fest
  if(r < 0 || r >= MAPH) return T_EMPTY;    // unten offen -> Sturz
  return grid[r][c];
}

const AT = { grass:[], dirt:[], rock:[], logM:[], logL:0, logR:0, rampUp:0, rampDn:0, doorT:0, doorM:0 };
function mkcv(w, h){ const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
function atile(w, h, ox, oy, paint){
  const cv = mkcv(w, h), g = cv.getContext('2d');
  paint(g);
  ATLAS.push({cv, ox, oy});
  return ATLAS.length - 1;
}
function fr(g, x, y, w, h, c){ g.fillStyle = c; g.fillRect(x, y, w, h); }

let DIRT_BASE = [PAL.dirt, PAL.dirtMid, PAL.dirtDeep];
let DIRT_DK   = [PAL.dirtMid, PAL.dirtDeep, PAL.dirtDeep2];

// Erde: Schichten-Streifen, Steinchen, optional Wurzelfaden.
// shade 0..2 = dunkler werdend nach unten.
function paintDirt(g, ox, oy, shade, seed, root){
  fr(g, ox, oy, 16, 16, DIRT_BASE[shade]);
  for(let yy=2; yy<16; yy+=5){                       // horizontale Erdschichten
    for(let i=0;i<16;i+=4)
      if(hash(seed*3+yy*17+i)%3) fr(g, ox+i, oy+yy, 3, 1, DIRT_DK[shade]);
  }
  for(let k=0;k<4;k++){                              // Steinchen + Krumen
    const h1 = hash(seed*5+k*31);
    const sx = h1%13, sy = 2+(hash(seed*9+k*17)%12);
    if(h1%3===0){ fr(g, ox+sx, oy+sy, 3, 2, PAL.pebble); fr(g, ox+sx, oy+sy, 1, 1, PAL.pebbleHi); }
    else fr(g, ox+sx, oy+sy, 2, 1, DIRT_DK[shade]);
  }
  if(root){                                          // Wurzel schlaengelt sich
    let rx = 3 + hash(seed*7)%9;
    for(let yy=0; yy<16; yy+=2){
      fr(g, ox+rx, oy+yy, 1, 2, PAL.logDark);
      rx += (hash(seed*11+yy)%3)-1; rx = Math.max(1, Math.min(14, rx));
    }
  }
}

function bl(g, x, h, c){ fr(g, x, 6-h, 1, h, c); }   // einzelner Grashalm ueber der Kante

// Gras-Oberkante: hellere Lip, ausgefranste Kante, Halme/Blumen-Varianten
function paintGrass(g, v, seed){
  const Y = 6;                                       // Tile-Ursprung (6px Ueberhang fuer Deko)
  paintDirt(g, 0, Y, 0, seed, false);
  fr(g, 0, Y, 16, 5, PAL.grass);
  for(let i=0;i<16;i+=2) if(hash(seed+i)%3===0) fr(g, i, Y+5, 2, 1, PAL.grass);  // ausgefranst
  fr(g, 0, Y+4, 16, 1, PAL.grassDk);                 // Schattenlinie
  fr(g, 0, Y, 16, 2, PAL.grassLip);
  for(let i=1;i<16;i+=3) if(hash(seed*3+i)%2===0) fr(g, i, Y+2, 1, 1, PAL.grassLip); // Zacken
  if(v===1){ bl(g, 9, 2, PAL.grass); }
  else if(v===2){ bl(g, 2, 3, PAL.grassLip); bl(g, 7, 4, PAL.grass); bl(g, 12, 3, PAL.grassLip); }
  else if(v===3){ fr(g, 4, Y-4, 1, 4, PAL.grass); fr(g, 6, Y-5, 1, 5, PAL.grassLip);
                  fr(g, 8, Y-4, 1, 4, PAL.grass); bl(g, 13, 3, PAL.grassLip); }
  else if(v===4){ bl(g, 3, 3, PAL.grassLip); bl(g, 11, 4, PAL.grass); fr(g, 10, Y-5, 1, 1, PAL.sun); }
  else if(v===5){ fr(g, 7, Y-4, 1, 4, PAL.grass); fr(g, 6, Y-7, 3, 3, PAL.flower);
                  fr(g, 7, Y-6, 1, 1, PAL.sun); fr(g, 8, Y-2, 2, 1, PAL.grassLip); bl(g, 2, 3, PAL.grassLip); }
}

// Fels: Highlight oben links, Risse, Moosflecken
function paintRock(g, v){
  fr(g, 2, 4, 12, 12, PAL.rock);
  fr(g, 4, 2, 8, 4, PAL.rock);
  fr(g, 3, 12, 10, 4, PAL.rockDark);
  fr(g, 12, 8, 2, 6, PAL.rockDark);
  fr(g, 4, 3, 5, 2, PAL.rockHi);
  fr(g, 3, 5, 2, 4, PAL.rockHi);

  else     { fr(g, 6, 6, 1, 4, PAL.rockDark); fr(g, 7, 10, 1, 2, PAL.rockDark); fr(g, 11, 3, 1, 3, PAL.rockDark); }
  fr(g, v?2:10, 13, 3, 2, PAL.moss);
  fr(g, v?3:11, 12, 2, 1, PAL.moss);
  fr(g, v?5:9, 14, 2, 2, PAL.mossDk);
}

// Baumstamm: Rindenkerben (vertikal), Jahresringe an den Enden
function paintLog(g, kind, seed){ // kind 0=Mitte, 1=linkes Ende, 2=rechtes Ende
  fr(g, 0, 3, 16, 10, PAL.log);
  fr(g, 0, 3, 16, 2, PAL.logRing);
  fr(g, 0, 11, 16, 2, PAL.logDark);
  for(let i=1;i<15;i+=3){                            // Rindenkerben
    const o = hash(seed+i)%3;
    fr(g, i+(o===2?1:0), 5+o, 1, 4, PAL.logDark);
  }
  fr(g, 2, 6, 3, 1, PAL.logRing); fr(g, 9, 8, 3, 1, PAL.logRing);  // Lichtkanten
  if(kind===1){                                      // Jahresringe (Stirnseite links)
    fr(g, 0, 3, 5, 10, PAL.logRing);
    fr(g, 1, 4, 3, 8, PAL.log);
    fr(g, 1, 6, 2, 4, PAL.logRing);
    fr(g, 2, 7, 1, 2, PAL.logDark);
  } else if(kind===2){                               // Jahresringe rechts
    fr(g, 11, 3, 5, 10, PAL.logRing);
    fr(g, 12, 4, 3, 8, PAL.log);
    fr(g, 13, 6, 2, 4, PAL.logRing);
    fr(g, 13, 7, 1, 2, PAL.logDark);
  }
}

// Rampe: Erdtextur + Grasnarbe entlang der Schraege
function paintRamp(g, up){
  const Y = 4, seed = up?77:88;
  for(let i=0;i<16;i++){
    const top = up ? Y+15-i : Y+i;
    fr(g, i, top, 1, Y+16-top, PAL.dirt);
  }
  for(let k=0;k<6;k++){                              // Erdkrumen im Dreieck
    const i = 2+(hash(seed+k*13)%12);
    const surf = up ? Y+15-i : Y+i;
    const room = Y+15-surf-3;
    if(room > 0){
      const yy = surf + 3 + (hash(seed*3+k*7)%room);
      fr(g, i, yy, 2, 1, PAL.dirtMid);
    }
  }
  fr(g, up?12:2, Y+13, 3, 2, PAL.pebble); fr(g, up?12:2, Y+13, 1, 1, PAL.pebbleHi);
  for(let i=0;i<16;i++){                             // Grasnarbe + Halme
    const top = up ? Y+15-i : Y+i;
    fr(g, i, top, 1, 2, PAL.grassLip);
    fr(g, i, top+2, 1, 2, PAL.grass);
    if(hash(seed*7+i)%4===0) fr(g, i, top-2, 1, 2, PAL.grassLip);
  }
}

// Tor: Holzplanken + Metallbaender mit Nieten
function paintDoor(g, top){
  fr(g, 2, 0, 12, 16, PAL.door);
  fr(g, 4, 0, 2, 16, PAL.doorBar); fr(g, 9, 0, 2, 16, PAL.doorBar);
  fr(g, 3, 0, 1, 16, PAL.doorSeam); fr(g, 8, 0, 1, 16, PAL.doorSeam); fr(g, 13, 0, 1, 16, PAL.doorSeam);
  const bys = top ? [12] : [2, 10];
  for(const by of bys){
    fr(g, 2, by, 12, 3, PAL.rockDark);
    fr(g, 2, by, 12, 1, PAL.rock);
    fr(g, 3, by+1, 1, 1, PAL.gold); fr(g, 7, by+1, 1, 1, PAL.gold); fr(g, 12, by+1, 1, 1, PAL.gold);
  }
  if(top){
    fr(g, 2, 0, 12, 3, PAL.doorDark);                // Sturz
    fr(g, 2, 3, 12, 1, PAL.doorBar);
  }
}

// Eisblock: glasige Flaeche, Diagonal-Glanz, dunkle Unterkante
function paintIce(g, v, seed){
  fr(g, 0, 0, 16, 16, PAL.ice);
  fr(g, 0, 0, 16, 2, PAL.iceHi);                     // Oberkante glaenzt
  fr(g, 0, 13, 16, 3, PAL.iceDk);

  for(let i=0;i<5;i++){                              // Diagonal-Glanzstreifen
    const x = (hash(seed+i*17)%14);

  if(v===0){ fr(g, 4, 4, 1, 4, PAL.iceDeep); fr(g, 5, 8, 1, 3, PAL.iceDeep); fr(g, 10, 6, 1, 5, PAL.iceDk); }
  else     { fr(g, 8, 3, 1, 5, PAL.iceDeep); fr(g, 7, 8, 1, 3, PAL.iceDk); fr(g, 12, 9, 1, 4, PAL.iceDeep); }

}

// Pilz-Sprungfeder: rote Kappe mit Punkten, heller Stiel
function paintShroom(g, v){

function makeAtlas(){
  // Reset: wird bei Level-Themes (Palette-Wechsel) neu gebaut
  ATLAS.length = 0;
  AT.grass = []; AT.dirt = []; AT.rock = []; AT.logM = []; AT.shroom = []; AT.ice = [];
  DIRT_BASE = [PAL.dirt, PAL.dirtMid, PAL.dirtDeep];
  DIRT_DK   = [PAL.dirtMid, PAL.dirtDeep, PAL.dirtDeep2];
  for(let v=0;v<6;v++) AT.grass.push(atile(16, 22, 0, -6, g=>paintGrass(g, v, 101+v*37)));
  for(let sh=0;sh<3;sh++) for(let v=0;v<3;v++)
    AT.dirt.push(atile(16, 16, 0, 0, g=>paintDirt(g, 0, 0, sh, 211+sh*53+v*17, v===2)));
  for(let v=0;v<2;v++) AT.rock.push(atile(16, 16, 0, 0, g=>paintRock(g, v)));
  for(let v=0;v<2;v++) AT.logM.push(atile(16, 16, 0, 0, g=>paintLog(g, 0, 401+v*29)));
  AT.logL = atile(16, 16, 0, 0, g=>paintLog(g, 1, 431));
  AT.logR = atile(16, 16, 0, 0, g=>paintLog(g, 2, 457));
  AT.rampUp = atile(16, 20, 0, -4, g=>paintRamp(g, true));
  AT.rampDn = atile(16, 20, 0, -4, g=>paintRamp(g, false));
  AT.doorT = atile(16, 16, 0, 0, g=>paintDoor(g, true));
  AT.doorM = atile(16, 16, 0, 0, g=>paintDoor(g, false));
  for(let v=0;v<2;v++) AT.shroom.push(atile(16, 16, 0, 0, g=>paintShroom(g, v)));
  for(let v=0;v<2;v++) AT.ice.push(atile(16, 16, 0, 0, g=>paintIce(g, v, 601+v*43)));
}

// Variantengitter: pro Zelle EINMAL beim Levelbau die Atlas-Kachel
// deterministisch (hash-basiert) auswaehlen.
function computeVGrid(){
  vgrid = [];
  for(let r=0;r<MAPH;r++){
    const row = new Int16Array(MAPW).fill(-1);
    for(let c=0;c<MAPW;c++){
      const t = grid[r][c];
      if(t===T_GROUND){
        if(tileAt(c, r-1)===T_EMPTY){
          const h2 = hash(c*13)%10;   // gleiche Verteilung wie im Prototyp
          row[c] = AT.grass[ h2<3 ? 2+h2 : (h2===4 ? 5 : hash(c*7)%2) ];
        } else {
          let n = 0, rr = r-1;
          while(rr>=0 && grid[rr][c]===T_GROUND){ n++; rr--; }
          const sh = n<=1 ? 0 : (n<=3 ? 1 : 2);      // dunkler nach unten
          row[c] = AT.dirt[sh*3 + hash(c*29+r*11)%3];
        }
      }
      else if(t===T_ROCK) row[c] = AT.rock[hash(c*17+r*5)%2];
      else if(t===T_LOG){
        const L = tileAt(c-1, r)===T_LOG, R = tileAt(c+1, r)===T_LOG;
        row[c] = !L ? AT.logL : (!R ? AT.logR : AT.logM[hash(c*5)%2]);
      }
      else if(t===T_RAMP_UP) row[c] = AT.rampUp;
      else if(t===T_RAMP_DN) row[c] = AT.rampDn;
      else if(t===T_DOOR) row[c] = tileAt(c, r-1)===T_DOOR ? AT.doorM : AT.doorT;
      else if(t===T_SHROOM) row[c] = AT.shroom[hash(c*23+r*7)%2];
      else if(t===T_ICE) row[c] = AT.ice[hash(c*19+r*3)%2];
    }
    vgrid.push(row);
  }
}

function buildBG(){

  // Wolken: 3 Pixel-Formen
  for(let v=0;v<3;v++){
    const cv = mkcv(34, 13), g = cv.getContext('2d');
    if(v===0){ fr(g,2,6,28,5,'#fff'); fr(g,8,2,15,5,'#fff'); fr(g,4,4,7,4,'#fff'); fr(g,4,9,24,2,PAL.cloudShade); }
    else if(v===1){ fr(g,0,7,34,4,'#fff'); fr(g,5,4,13,4,'#fff'); fr(g,21,5,9,3,'#fff'); fr(g,2,9,30,2,PAL.cloudShade); }
    else { fr(g,4,7,25,4,'#fff'); fr(g,6,3,9,5,'#fff'); fr(g,16,2,10,6,'#fff'); fr(g,6,9,21,2,PAL.cloudShade); }
    BG.clouds.push(cv);
  }

  // Ferne Huegelkette (hell) mit Waeldchen
  BG.far = mkcv(BGW, VH); const f = BG.far.getContext('2d');
  for(let x=0;x<BGW;x++){
    const y = Math.round(hillY(x, 118, 34));
    fr(f, x, y, 1, VH-y, PAL.hillFar);
    fr(f, x, y, 1, 2, PAL.hillFarHi);
  }
  for(let k=0;k<11;k++){
    const tx = 10+(k*43+hash(k*7)%20);
    if(tx > BGW-14) break;
    const ty = Math.round(hillY(tx, 118, 34));
    paintTreeFar(f, tx, ty, hash(k*13)%2);
    if(hash(k*3)%2) paintTreeFar(f, tx+6, Math.round(hillY(tx+6, 118, 34)), hash(k*17)%2);
  }

  // Nahe Huegel mit Bueschen und Bluemchen
  BG.near = mkcv(BGW, VH); const n = BG.near.getContext('2d');
  for(let x=0;x<BGW;x++){
    const y = Math.round(hillY(x+137, 136, 26));   // Phase versetzt (tilet weiterhin)
    fr(n, x, y, 1, VH-y, PAL.hillNear);
    fr(n, x, y, 1, 2, PAL.hillNearHi);
  }
  for(let k=0;k<9;k++){
    const bx = 14+(k*52+hash(k*23)%26);
    if(bx > BGW-10) break;
    paintBush(n, bx, Math.round(hillY(bx+137, 136, 26)), hash(k*29)%2);
  }
  for(let k=0;k<12;k++){
    const fx = 6+(k*39+hash(k*41)%22);
    if(fx > BGW-4) break;
    const fy = Math.round(hillY(fx+137, 136, 26)) + 3 + (hash(k)%6);
    fr(n, fx, fy, 1, 2, PAL.grassDk);
    fr(n, fx, fy-1, 1, 1, hash(k*5)%2 ? PAL.flower : PAL.sun);
  }
}

// STATE
// ============================================================
let state = 'title';   // title | intro | play | pause | rescue | gameover | win
let stateT = 0;        // Zeit im aktuellen State
let gt = 0;            // globale Zeit
let playT = 0;         // Spielzeit des Laufs
let hearts = 3, saladCount = 0, shardCount = 0;
let bossDead = false;
let enemies = [], particles = [];
let cam = {x:0, y:MAPH*TILE - VH, shake:0};
let zip = null;        // Zip-Animation bei Rettung
let flashT = 0;        // Screen-Flash beim Splitter

const P = {
  x:0, y:0, w:13, h:19, vx:0, vy:0,
  dir:1,                 // Fahrtrichtung: +1 rechts, -1 links (Panzer-Kickturn an Waenden)
  turnT:0,               // Cooldown nach Kickturn (verhindert Flackern in Nischen)
  grounded:false, lastGroundT:-9, rolling:false, rollA:0,
  invulnT:0, paddleT:-9, dead:false
};

// Physik-Konstanten
const GRAV = 850, JUMP_V = -292, BASE_SPD = 80, MAX_SPD = 205;
const PADDLE_BOOST = 55, COYOTE = 0.1, JBUF = 0.13;

// Vibration (Mobile) – nur wenn verfuegbar
const SHARD_VIB = [12, 30, 12];
function vib(p){ if(navigator.vibrate) navigator.vibrate(p); }

// ============================================================
// AUDIO – Chiptune-SFX + Hintergrund-Loop (WebAudio, ohne Assets)
// Initialisiert erst bei der ersten Nutzer-Geste (Autoplay-Policy).
// ============================================================
const AU = {
  ctx:null, master:null, muted:false, musicOn:false,
  nextT:0, step:0, _noiseBuf:null,
  // I-V-vi-IV in C: Bass (Wurzel/Quinte) + sparsame Pentatonik-Melodie, 32 Achtel
  BASS:[65,0,98,0,65,0,98,0, 98,0,147,0,98,0,147,0, 110,0,165,0,110,0,165,0, 87,0,131,0,87,0,131,0],
  MEL:[659,0,784,0,523,0,0,0, 587,0,392,0,0,0,587,0, 659,0,523,0,440,0,0,0, 523,0,440,0,349,0,0,0],
  init(){
    if(this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = this.muted ? 0 : 0.5;
    this.master.connect(this.ctx.destination);
    setInterval(() => this.sched(), 60);
  },
  resume(){ if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  // Android-WebView spielt WebAudio im Hintergrund weiter -> hart anhalten
  suspend(){ if(this.ctx && this.ctx.state === 'running') this.ctx.suspend(); },
  setMute(m){
    this.muted = m;
    if(this.master) this.master.gain.value = m ? 0 : 0.5;
    // beim Entstummen Scheduler neu aufsetzen (sonst Noten-Burst durch Aufholen)
    if(!m && this.ctx) this.nextT = this.ctx.currentTime + 0.06;
  },
  setMusic(on){
    if(on === this.musicOn) return;
    this.musicOn = on;
    if(on && this.ctx){ this.nextT = this.ctx.currentTime + 0.06; }
  },
  toneAt(f, at, dur, type, vol, f1){
    if(!this.ctx || this.muted) return;
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(f, at);
    if(f1) o.frequency.exponentialRampToValueAtTime(Math.max(30, f1), at + dur);
    g.gain.setValueAtTime(vol, at);
    g.gain.exponentialRampToValueAtTime(0.001, at + dur);
    o.connect(g); g.connect(this.master);
    o.start(at); o.stop(at + dur + 0.02);
  },
  tone(f, f1, t0, dur, type, vol){
    if(this.ctx) this.toneAt(f, this.ctx.currentTime + t0, dur, type, vol, f1);
  },
  noise(t0, dur, vol){
    if(!this.ctx || this.muted) return;
    const c = this.ctx;
    if(!this._noiseBuf){
      const b = c.createBuffer(1, (c.sampleRate*0.3)|0, c.sampleRate);
      const d = b.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2 - 1;
      this._noiseBuf = b;
    }
    const at = c.currentTime + t0;
    const s = c.createBufferSource(), g = c.createGain();
    s.buffer = this._noiseBuf;
    g.gain.setValueAtTime(vol, at);
    g.gain.exponentialRampToValueAtTime(0.001, at + dur);
    s.connect(g); g.connect(this.master);
    s.start(at); s.stop(at + dur + 0.02);
  },
  sched(){ // Musik-Scheduler mit Lookahead (~112 BPM, Achtel = 0.268s)
    if(!this.ctx || !this.musicOn || this.muted) return;
    while(this.nextT < this.ctx.currentTime + 0.18){
      const i = this.step % 32;
      if(this.BASS[i]) this.toneAt(this.BASS[i], this.nextT, 0.24, 'triangle', 0.10);
      if(this.MEL[i])  this.toneAt(this.MEL[i],  this.nextT, 0.20, 'square',   0.05);
      this.nextT += 0.268; this.step++;
    }
  },
  // --- SFX ---
  jump(){ this.tone(300, 660, 0, 0.14, 'square', 0.15); },
  bounce(){ this.tone(400, 950, 0, 0.18, 'square', 0.17); },
  salad(){ this.tone(880, 1320, 0, 0.09, 'square', 0.11); },
  shard(){ [660,880,1320].forEach((f,i)=>this.tone(f, 0, i*0.07, 0.12, 'square', 0.14)); },
  stomp(){ this.tone(300, 90, 0, 0.16, 'triangle', 0.3); this.noise(0, 0.1, 0.12); },
  hurt(){ this.tone(200, 70, 0, 0.3, 'sawtooth', 0.18); },
  checkpoint(){ [523,784].forEach((f,i)=>this.tone(f, 0, i*0.09, 0.15, 'square', 0.13)); },
  turn(){ this.tone(520, 260, 0, 0.09, 'square', 0.12); },              // Panzer-Kickturn
  spring(){ this.tone(220, 880, 0, 0.22, 'triangle', 0.22); },          // Pilz-Feder "Boing"
  door(){ this.tone(120, 60, 0, 0.5, 'sawtooth', 0.22); this.noise(0, 0.3, 0.15); },
  bossHit(){ this.tone(250, 80, 0, 0.2, 'square', 0.2); this.noise(0, 0.12, 0.14); },
  fanfare(){ [523,659,784,1047].forEach((f,i)=>this.tone(f, 0, i*0.13, i===3?0.5:0.14, 'square', 0.15)); },
  gameover(){ [392,330,262,196].forEach((f,i)=>this.tone(f, 0, i*0.18, 0.22, 'triangle', 0.16)); },
  click(){ this.tone(700, 0, 0, 0.05, 'square', 0.09); }
};

function resetEnemies(){
  enemies = [];
  for(const s of spawns){
    if(s.type === 'boss' && bossDead) continue;
    if(s.type === 'guard')
      enemies.push({type:'guard', x:s.x, y:s.y, w:14, h:14, x0:s.x, dir:1, spd:28, alive:true, t:Math.random()*6});
    else if(s.type === 'sleeper')
      enemies.push({type:'sleeper', x:s.x, y:s.y, w:14, h:13, alive:true, awake:false, t:Math.random()*6});
    else if(s.type === 'boss')
      enemies.push({type:'boss', x:s.x, y:s.y, w:22, h:22, x0:s.x, doorX:s.doorX, dir:1, spd:52,
                    hp:3, alive:true, stunT:0, flashT:0, t:0});
  }
}

function openDoor(){
  for(let r=0;r<MAPH;r++) for(let c=0;c<MAPW;c++)
    if(grid[r][c] === T_DOOR){ grid[r][c] = 0; vgrid[r][c] = -1; puff(c*TILE+8, r*TILE+8, PAL.doorBar, 3); }
  computeVGrid(); // Bodenkacheln unter dem entfernten Tor neu klassifizieren (Gras statt Dirt)
  cam.shake = Math.max(cam.shake, 3);
}

function respawnPlayer(){
  const cp = checkpoint && checkpoint.active;
  const sp = cp ? {x:checkpoint.x - 2, y:checkpoint.y - 19} : playerStart;
  P.x = sp.x; P.y = sp.y;
  P.vx = BASE_SPD; P.vy = 0; P.rolling = false; P.h = 19;
  P.dir = cp ? checkpoint.dir : 1;   // auf Etagen: in gemerkter Fahrtrichtung weiter
  P.turnT = 0;
  P.grounded = false; P.invulnT = 1.2;
  cam.x = Math.max(0, P.x - 100);
  cam.y = Math.max(0, Math.min(P.y - VH*0.55, MAPH*TILE - VH));
  resetEnemies();
}

// Theme des Levels anwenden: Palette ueberschreiben, Texturen neu backen
function applyTheme(theme){
  Object.assign(PAL, PAL_BASE, theme);
  makeAtlas(); buildBG();
}

function startLevel(w, l){    // Theme laden; Story-Card nur beim ersten Betreten der Welt
  curWorld = w; curLvl = l; selW = w; selL = l;
  applyTheme(WORLDS[w].theme);
  if(!seenIntro[w]){ seenIntro[w] = true; state = 'intro'; stateT = 0; }
  else startRun();
}

function startRun(){          // kompletter Neustart des Levels (Checkpoint resettet)
  buildLevel(); buildHints();
  hearts = 3; saladCount = 0; shardCount = 0; bossDead = false;
  particles = []; playT = 0; zip = null; flashT = 0;
  respawnPlayer(); P.invulnT = 0;
  state = 'play'; stateT = 0;
}

// ============================================================
// INPUT  (Touch: Tippen = Sprung, Halten = Rollen | Tastatur: Space / Runter)
// ============================================================
let jumpBufT = -9, lastTapT = -9, pointerHeld = false, holdT = 0, keyRoll = false;
// Touch/Maus teilen sich EINEN Knopf fuer Sprung und Rollen. Ein Tap darf nicht
// zuerst einen Sprung ausloesen und dann erst ins Rollen kippen ("Hüpfer vorm
// Rollen"). Deshalb wird bei Touch/Maus der Sprung nicht sofort gezuendet,
// sondern erst entschieden: schnell losgelassen (< ROLL_HOLD_T) = Sprung,
// laenger gehalten = direkt Rollen (kein Sprung). Tastatur ist unbetroffen,
// da dort eine eigene Taste (Pfeil-runter/S) fuers Rollen zustaendig ist.
let padJumpPending = false;
const ROLL_HOLD_T = 0.08;

function jumpNow(){ jumpBufT = gt; lastTapT = gt; }   // sofortiger Sprung-Trigger (Tastatur + entschiedener Touch-Tap)

function tap(cp){
  if(state === 'play'){ padJumpPending = true; }       // Entscheidung (Sprung/Rollen) faellt in updatePlayer()
  else if(state === 'pause'){ if(stateT > 0.15){ state = 'play'; stateT = 0; holdT = -9; } } // Resume-Tap darf kein Rollen ausloesen
  else if(state === 'worldsel'){
    if(stateT < 0.3) return;
    if(cp){
      const i = Math.floor((cp.x - 16) / 98);          // 3 Karten a 90px + 8 Abstand
      if(i >= 0 && i < WORLDS.length && cp.y > 36 && cp.y < 140) selW = i;
      else return;
    }
    if(!isUnlocked(selW, 0)){ AU.hurt(); return; }      // gesperrt
    AU.click(); selL = 0;
    applyTheme(WORLDS[selW].theme);                     // Menue-Himmel im Welt-Look
    state = 'levelsel'; stateT = 0;
  }
  else if(state === 'levelsel'){
    if(stateT < 0.3) return;
    if(cp){
      if(cp.x < 52 && cp.y < 34){ AU.click(); state = 'worldsel'; stateT = 0; return; } // Zurueck
      const i = Math.floor((cp.x - 40) / 84);          // 3 Buttons a 72px + 12 Abstand
      if(i >= 0 && i < 3 && cp.y > 56 && cp.y < 140) selL = i;
      else return;
    }
    if(!isUnlocked(selW, selL)){ AU.hurt(); return; }
    AU.click();
    startLevel(selW, selL);
  }
  else menuAdvance();
}
function menuAdvance(){
  if(stateT < 0.5) return; // Doppel-Tipp-Schutz
  AU.click();
  if(state === 'title'){ state = 'worldsel'; stateT = 0; }
  else if(state === 'intro'){ startRun(); }
  else if(state === 'gameover'){ startRun(); }
  else if(state === 'win'){
    const W = WORLDS[curWorld];
    if(curLvl + 1 < W.levels.length) startLevel(curWorld, curLvl + 1);
    else if(curWorld + 1 < WORLDS.length) startLevel(curWorld + 1, 0);
    else { state = 'worldsel'; stateT = 0; }
  }
}

// Bildschirm-Koordinaten -> Canvas-Koordinaten (fuer den Mute-Button)
function canvasPos(e){
  const r = cvs.getBoundingClientRect();
  if(!r.width || !r.height) return { x:-1, y:-1 };  // Layout (noch) nicht da
  return { x:(e.clientX - r.left)/r.width*VW, y:(e.clientY - r.top)/r.height*VH };
}

addEventListener('keydown', e => {
  if(e.repeat) return;
  AU.init(); AU.resume();
  if((state === 'worldsel' || state === 'levelsel') && (e.code==='ArrowLeft' || e.code==='ArrowRight')){
    const dlt = e.code==='ArrowLeft' ? -1 : 1;
    if(state === 'worldsel') selW = Math.max(0, Math.min(WORLDS.length-1, selW + dlt));
    else selL = Math.max(0, Math.min(WORLDS[selW].levels.length-1, selL + dlt));
    AU.click(); e.preventDefault(); return;
  }
  if(state === 'levelsel' && (e.code==='Backspace' || e.code==='Escape')){
    state = 'worldsel'; stateT = 0; AU.click(); e.preventDefault(); return;
  }
  if(e.code==='Space' || e.code==='ArrowUp' || e.code==='KeyW'){
    if(state === 'play') jumpNow();        // Tastatur: keine Tap/Halten-Ambiguitaet -> sofort
    else tap(null);
    e.preventDefault();
  }
  if(e.code==='ArrowDown' || e.code==='KeyS'){ keyRoll = true; e.preventDefault(); }
  if(e.code==='KeyM'){ AU.setMute(!AU.muted); }
});
addEventListener('keyup', e => {
  if(e.code==='ArrowDown' || e.code==='KeyS') keyRoll = false;
});
const activePointers = new Set();
addEventListener('pointerdown', e => {
  e.preventDefault();
  AU.init(); AU.resume();
  // Mute-Button (Ecke unten rechts) faengt den Tap ab
  const cp = canvasPos(e);
  if(cp.x > VW-26 && cp.y > VH-22){ AU.setMute(!AU.muted); AU.click(); return; }
  activePointers.add(e.pointerId);
  pointerHeld = true;
  if(activePointers.size === 1){ holdT = 0; tap(cp); } // nur der erste Finger zaehlt als Tap/Hold
});
addEventListener('pointerup',   e => { activePointers.delete(e.pointerId); pointerHeld = activePointers.size > 0; });
addEventListener('pointercancel',e => { activePointers.delete(e.pointerId); pointerHeld = activePointers.size > 0; });
addEventListener('touchmove', e => e.preventDefault(), {passive:false});
addEventListener('contextmenu', e => e.preventDefault());

// App in den Hintergrund -> Pause (nur waehrend des Spielens)
document.addEventListener('visibilitychange', () => {
  if(document.hidden && state === 'play'){
    state = 'pause'; stateT = 0;
    pointerHeld = false; keyRoll = false; activePointers.clear(); padJumpPending = false;
  }
  // Musik sofort stoppen: ohne rAF laeuft update() nicht mehr,
  // der Interval-Scheduler wuerde sonst im Hintergrund weiterdudeln
  if(document.hidden){ AU.setMusic(false); AU.suspend(); }
  else AU.resume();
});
// Fokusverlust: gehaltene Eingaben loslassen (keyup/pointerup kommen sonst nie an)
addEventListener('blur', () => { pointerHeld = false; keyRoll = false; activePointers.clear(); padJumpPending = false; });

// ============================================================
// UPDATE
// ============================================================
function hurt(knock){
  if(P.invulnT > 0) return;
  hearts--;
  vib(30); AU.hurt();
  cam.shake = Math.max(cam.shake, 3);
  puff(P.x+7, P.y+8, PAL.heart, 6);
  if(hearts <= 0){ state = 'gameover'; stateT = 0; AU.gameover(); return; }
  P.invulnT = 1.4;
  if(knock){ P.vy = -160; P.vx = BASE_SPD*0.4; }
}

function fallDeath(){
  hearts--;
  vib(30); AU.hurt();
  if(hearts <= 0){ state = 'gameover'; stateT = 0; AU.gameover(); return; }
  respawnPlayer();   // respawnt am Checkpoint, falls aktiviert
}

function overlap(a, b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function headroomFree(){ // Platz zum Aufstehen?
  const standH = 19, top = P.y + P.h - standH;
  const r = Math.floor(top/TILE);
  for(let c = Math.floor((P.x+1)/TILE); c <= Math.floor((P.x+P.w-1)/TILE); c++)
    if(isSolid(tileAt(c, r))) return false;
  return true;
}

function updatePlayer(dt){
  // Touch/Maus-Tap: erst jetzt entscheiden, ob es ein Sprung oder ein Halten-zum-Rollen war.
  // Losgelassen, bevor die Halten-Schwelle erreicht ist -> Sprung. Noch gehalten, sobald
  // die Schwelle erreicht ist -> wird zu Rollen, der Sprung wird ersatzlos verworfen.
  if(padJumpPending){
    if(!pointerHeld){ jumpNow(); padJumpPending = false; }
    else if(holdT > ROLL_HOLD_T){ padJumpPending = false; }
  }

  const wantRoll = keyRoll || (pointerHeld && holdT > ROLL_HOLD_T);

  // --- Rollen an/aus ---
  if(wantRoll && !P.rolling){
    P.rolling = true;
    P.y += P.h - 11; P.h = 11; // Hitbox schrumpft (Fuesse bleiben)
  } else if(!wantRoll && P.rolling && headroomFree()){
    P.y -= 19 - P.h; P.h = 19;
    P.rolling = false;
  }

  // --- Auto-Run + Momentum (leicht rutschig) ---
  // Bergab/bergauf haengt von der Fahrtrichtung ab (Kickturn!)
  const onDown = onRampType(T_RAMP_DN), onUp = onRampType(T_RAMP_UP);
  const downhill = P.dir === 1 ? onDown : onUp;
  const uphill   = P.dir === 1 ? onUp : onDown;
  // Eis unter den Fuessen (Welt 3): fast keine Reibung - Boost haelt,
  // aber auch das Anfahren ist traege (Drift-Gefuehl)
  let onIce = false;
  if(P.grounded){
    const fr2 = Math.floor((P.y+P.h+1)/TILE), fc = Math.floor((P.x+P.w/2)/TILE);
    onIce = tileAt(fc, fr2) === T_ICE;
  }
  if(P.rolling && P.grounded && downhill){
    P.vx = Math.min(MAX_SPD, P.vx + 300*dt); // Panzer-Roll bergab = Boost
  } else if(P.vx < BASE_SPD){
    P.vx = Math.min(BASE_SPD, P.vx + (onIce?60:170)*dt);
  } else {
    P.vx = Math.max(BASE_SPD, P.vx - (onIce?6:(P.rolling?38:58))*dt); // Boost klingt langsam ab
  }
  if(P.grounded && uphill && !P.rolling) P.vx = Math.max(BASE_SPD*0.85, P.vx - 90*dt);

  // --- Sprung (Buffer + Coyote), Paddel-Push ---
  const canJump = P.grounded || (gt - P.lastGroundT < COYOTE && P.vy >= 0);
  if(gt - jumpBufT < JBUF && canJump){
    let ok = true;
    if(P.rolling){
      if(headroomFree()){ P.y -= 19 - P.h; P.h = 19; P.rolling = false; }
      else ok = false; // unter Baumstamm: kein Sprung
    }
    if(ok){
      P.vy = JUMP_V;
      P.vx = Math.min(MAX_SPD, P.vx + PADDLE_BOOST);
      P.paddleT = gt;
      P.grounded = false; jumpBufT = -9;
      puff(P.x+4, P.y+P.h, '#ffffff', 3);
      AU.jump();
    }
  }

  // --- Gravitation (eingerollt in der Luft: schneller fallen) ---
  const g = (P.rolling && !P.grounded) ? GRAV*1.55 : GRAV;
  P.vy = Math.min(P.rolling?460:400, P.vy + g*dt);
  const fallV = P.vy;          // fuer Lande-Staub

  const wasGrounded = P.grounded;
  P.grounded = false;

  // --- X bewegen + Kollision (in Fahrtrichtung) ---
  // Fuss-Marge = Step-Assist: kleine Stufen (Rampen-Uebergaenge) blockieren nicht,
  // volle Tiles (Steine, Waende) schon. Wand-Treffer = PANZER-KICKTURN:
  // Shelly prallt ab und faehrt in die Gegenrichtung weiter (Yeah-Bunny-Prinzip).
  P.x += P.dir * P.vx * dt;
  P.turnT = Math.max(0, P.turnT - dt);
  {
    const top = P.y+1, bot = P.y+P.h-(P.rolling?6:10);
    const fwd = P.vx >= 0 ? P.dir : -P.dir;          // echte Bewegungsrichtung (Knockback: vx<0)
    const c = Math.floor((fwd > 0 ? P.x+P.w : P.x)/TILE);
    for(let r = Math.floor(top/TILE); r <= Math.floor(bot/TILE); r++){
      const t = tileAt(c, r);
      if(isSolid(t)){
        P.x = fwd > 0 ? c*TILE - P.w - 0.01 : (c+1)*TILE + 0.01;
        if(P.vx > 0 && fwd === P.dir && P.turnT <= 0){
          P.dir *= -1; P.turnT = 0.12;
          P.vx = Math.min(P.vx, BASE_SPD);           // Boost verpufft am Aufprall
          puff(fwd > 0 ? P.x+P.w+1 : P.x-1, P.y+P.h*0.5, PAL.dust2, 4);
          AU.turn();
        }
        break;
      }
    }
  }

  // --- Y bewegen + Kollision ---
  P.y += P.vy*dt;
  if(P.vy >= 0){
    const r = Math.floor((P.y+P.h)/TILE);
    let shroom = false, solid = false;
    for(let c = Math.floor((P.x+1)/TILE); c <= Math.floor((P.x+P.w-1)/TILE); c++){
      const t = tileAt(c, r);
      if(t === T_SHROOM) shroom = true;
      else if(isSolid(t)) solid = true;
    }
    if(shroom){
      // PILZ-FEDER: wirft hoch statt zu tragen; Tipp beim Aufprall = Super-Bounce
      P.y = r*TILE - P.h;
      const high = (gt - lastTapT) < 0.16;
      P.vy = high ? -540 : -430;
      jumpBufT = -9; P.grounded = false;
      puff(P.x+P.w/2, P.y+P.h, '#ffffff', 4);
      puff(P.x+P.w/2, P.y+P.h, PAL.shroomCapHi, 3);
      if(high) sparkle(P.x+6, P.y+P.h, PAL.shard);
      AU.spring(); vib(12);
    } else if(solid){
      P.y = r*TILE - P.h; P.vy = 0; P.grounded = true;
    }
  } else {
    const r = Math.floor(P.y/TILE);
    for(let c = Math.floor((P.x+1)/TILE); c <= Math.floor((P.x+P.w-1)/TILE); c++){
      if(isSolid(tileAt(c, r))){ P.y = (r+1)*TILE + 0.01; P.vy = 0; break; }
    }
  }

  // --- Rampen (45 Grad): Boden unter Spielermitte samplen ---
  {
    const cx = P.x + P.w/2, c = Math.floor(cx/TILE);
    for(let r = 0; r < MAPH; r++){
      const t = tileAt(c, r);
      if(t !== T_RAMP_UP && t !== T_RAMP_DN) continue;
      const f = (cx - c*TILE)/TILE;
      const surf = t===T_RAMP_UP ? (r+1)*TILE - f*TILE : r*TILE + f*TILE;
      const stick = wasGrounded ? 10 : 2;
      if(P.vy >= 0 && P.y+P.h >= surf - stick){
        P.y = surf - P.h; P.vy = 0; P.grounded = true;
      }
      break;
    }
  }

  if(P.grounded) P.lastGroundT = gt;
  if(P.rolling) P.rollA += P.vx*dt/6;
  P.invulnT = Math.max(0, P.invulnT - dt);

  // --- Lande-Staub (Juice, rein kosmetisch) ---
  if(P.grounded && !wasGrounded && fallV > 170){
    dust(P.x + P.w/2, P.y + P.h);
    if(fallV > 330) cam.shake = Math.max(cam.shake, 1.5);
  }

  // --- Sturz in Luecke ---
  if(P.y > MAPH*TILE + 30){ fallDeath(); return; }

  // --- Checkpoint beruehren ---
  if(checkpoint && !checkpoint.active &&
     P.x + P.w > checkpoint.x && P.x < checkpoint.x + 12 &&
     P.y + P.h > checkpoint.y - 28){
    checkpoint.active = true; checkpoint.animT = 0;
    checkpoint.dir = P.dir;
    sparkle(checkpoint.x + 6, checkpoint.y - 20, PAL.bow);
    puff(checkpoint.x + 6, checkpoint.y - 4, PAL.grassLip, 4);
    vib(20); AU.checkpoint();
  }

  // --- Collectibles ---
  for(const it of collectibles){
    if(it.got) continue;
    if(overlap(P, it)){
      it.got = true;
      if(it.kind === 'salad'){ saladCount++; sparkle(it.x+3, it.y+3, PAL.salad); AU.salad(); }
      else {
        shardCount++; sparkle(it.x+3, it.y+5, PAL.shard);
        cam.shake = Math.max(cam.shake, 2);
        flashT = 0.16; vib(SHARD_VIB); AU.shard();
      }
    }
  }

  // --- Kaefig (Welt-Finale) ---
  if(cage && !cage.open && overlap(P, cage)){
    cage.open = true;
    markDone();
    state = 'rescue'; stateT = 0;
    zip = {x:cage.x+8, y:cage.y+18, vy:0, hop:0};
    P.vx = 0;
    sparkle(cage.x+11, cage.y+10, PAL.shard);
    AU.fanfare();
  }

  // --- Zielflagge (normales Level-Ende) ---
  if(goal && !goal.reached && overlap(P, goal)){
    goal.reached = true;
    markDone();
    state = 'clear'; stateT = 0;
    P.vx = 0;
    sparkle(goal.x+6, goal.y+6, PAL.gold);
    AU.fanfare(); vib(25);
  }
}

function onRampType(type){
  const cx = P.x + P.w/2, c = Math.floor(cx/TILE);
  for(let r = 0; r < MAPH; r++){
    const t = tileAt(c, r);
    if(t === T_RAMP_UP || t === T_RAMP_DN) return t === type;
  }
  return false;
}

function killEnemy(e){
  e.alive = false;
  puff(e.x+e.w/2, e.y+e.h/2, PAL.crowWing, 7);
  puff(e.x+e.w/2, e.y+e.h/2, PAL.crow, 4);
}

function updateEnemies(dt){
  for(const e of enemies){
    if(!e.alive) continue;
    e.t += dt;
    if(e.type === 'guard'){
      e.x += e.dir*e.spd*dt;
      if(e.x > e.x0+44){ e.x = e.x0+44; e.dir = -1; }
      if(e.x < e.x0-44){ e.x = e.x0-44; e.dir = 1; }
    } else if(e.type === 'boss'){
      e.flashT = Math.max(0, e.flashT-dt);
      if(e.stunT > 0){ e.stunT -= dt; }
      else {
        // verfolgt Shelly innerhalb der Arena
        const tgt = P.x + P.w/2 - e.w/2;
        e.dir = tgt > e.x+2 ? 1 : (tgt < e.x-2 ? -1 : e.dir);
        e.x += e.dir*e.spd*dt;
        e.x = Math.max(e.x0-90, Math.min(e.doorX - e.w - 4, e.x));
      }
    }

    if(!overlap(P, e)) continue;

    if(e.type === 'sleeper'){
      if(P.rolling || P.invulnT > 0) continue; // leise vorbeirollen
      e.awake = true;
      hurt(true);
      continue;
    }
    if(P.rolling && e.type === 'guard'){ killEnemy(e); AU.stomp(); continue; } // Panzer-Roll zerschmettert

    const stomp = P.vy > 40 && (P.y + P.h) < e.y + e.h*0.65;
    if(stomp && !P.rolling){
      const high = (gt - lastTapT) < 0.16; // Shell-Bounce: Tipp beim Aufprall
      if(e.type === 'boss'){
        e.hp--; e.flashT = 0.25; e.stunT = 0.6;
        vib(15); AU.bossHit();
        cam.shake = Math.max(cam.shake, 3);
        puff(e.x+e.w/2, e.y, '#fff', 4);
        if(e.hp <= 0){ killEnemy(e); bossDead = true; openDoor(); AU.door(); }
      } else { killEnemy(e); AU.stomp(); }
      P.vy = high ? -338 : -200;
      if(high){ sparkle(P.x+6, P.y+P.h, PAL.shard); AU.bounce(); }
      jumpBufT = -9;
    } else if(e.type === 'boss' && P.rolling){
      P.vx = -40; P.vy = -140; // Boss blockt den Roll, prallt ab
    } else {
      hurt(true);
    }
  }
}

// ---- Partikel ----
function puff(x, y, col, n){
  for(let i=0;i<n;i++) particles.push({
    x, y, vx:(Math.random()-0.5)*90, vy:(Math.random()-0.7)*90,
    life:0.35+Math.random()*0.3, col, s:2+Math.random()*2
  });
}
function sparkle(x, y, col){
  for(let i=0;i<6;i++){
    const a = i/6*Math.PI*2;
    particles.push({x, y, vx:Math.cos(a)*55, vy:Math.sin(a)*55-25, life:0.4, col, s:2});
  }
}
function dust(x, y){   // Staub beim Landen
  for(let i=0;i<5;i++) particles.push({
    x: x+(Math.random()-0.5)*10, y: y-1,
    vx: (Math.random()-0.5)*70, vy: -Math.random()*45,
    life: 0.25+Math.random()*0.2, col: i%2 ? PAL.dust1 : PAL.dust2, s:2
  });
}
function updateParticles(dt){
  for(const p of particles){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=300*dt; }
  particles = particles.filter(p => p.life > 0);
}

function update(dt){
  stateT += dt;
  if(pointerHeld) holdT += dt;
  flashT = Math.max(0, flashT - dt);
  AU.setMusic(state === 'play' || state === 'rescue'); // Loop nur im Spiel
  cam.shake = Math.max(0, cam.shake - 14*dt); // Shake in jedem State abbauen (sonst zittert Gameover/Pause dauerhaft)

  if(state === 'play'){
    playT += dt;
    updatePlayer(dt);
    if(state !== 'play') { updateParticles(dt); return; } // Tod diese Frame
    updateEnemies(dt);
    updateParticles(dt);
    if(checkpoint && checkpoint.active && checkpoint.animT < 2) checkpoint.animT += dt;
    // Kamera: schaut in Fahrtrichtung voraus, folgt vertikal (Etagen-Level)
    const look = P.dir === 1 ? 100 : VW - 100 - P.w;
    const target = Math.max(0, Math.min(P.x - look, MAPW*TILE - VW));
    cam.x += (target - cam.x)*Math.min(1, 12*dt);
    const targetY = Math.max(0, Math.min(P.y - VH*0.55, MAPH*TILE - VH));
    cam.y += (targetY - cam.y)*Math.min(1, 8*dt);
  } else if(state === 'pause'){
    // eingefroren – nur auf Tipp warten
  } else if(state === 'clear'){
    updateParticles(dt);
    if(goal && Math.random() < 0.2)
      sparkle(goal.x + 6 + (Math.random()-0.5)*26, goal.y + Math.random()*30, PAL.gold);
    if(stateT > 1.3){ state = 'win'; stateT = 0; }
  } else if(state === 'rescue'){
    updateParticles(dt);
    if(zip){
      zip.hop += dt*7;
      if(stateT > 0.4) zip.x += 18*dt; // Zip huepft raus
      if(stateT > 0.3 && Math.random() < 0.15)
        sparkle(cage.x+Math.random()*24, cage.y+Math.random()*24, PAL.shard);
    }
    if(stateT > 1.6){ state = 'win'; stateT = 0; }
  } else {
    updateParticles(dt);
  }
}

function px(x, y, w, h, c){ ctx.fillStyle = c; ctx.fillRect(Math.round(x), Math.round(y), w, h); }

// ============================================================
// PIXEL-FONT 5x7 – jede Glyphe = 7 Zeilen-Bitmasken (Bit 4 = links).
// Per fillRect gezeichnet -> pixelscharf bei jeder Skalierung,
// kein Anti-Aliasing wie bei ctx.fillText.
// ============================================================
const FONT = {
  A:[14,17,17,31,17,17,17], B:[30,17,17,30,17,17,30], C:[14,17,16,16,16,17,14],
  D:[28,18,17,17,17,18,28], E:[31,16,16,30,16,16,31], F:[31,16,16,30,16,16,16],
  G:[14,17,16,23,17,17,15], H:[17,17,17,31,17,17,17], I:[14,4,4,4,4,4,14],
  J:[7,2,2,2,2,18,12],      K:[17,18,20,24,20,18,17], L:[16,16,16,16,16,16,31],
  M:[17,27,21,21,17,17,17], N:[17,25,21,19,17,17,17], O:[14,17,17,17,17,17,14],
  P:[30,17,17,30,16,16,16], Q:[14,17,17,17,21,18,13], R:[30,17,17,30,20,18,17],
  S:[15,16,16,14,1,1,30],   T:[31,4,4,4,4,4,4],       U:[17,17,17,17,17,17,14],
  V:[17,17,17,17,17,10,4],  W:[17,17,17,21,21,21,10], X:[17,17,10,4,10,17,17],
  Y:[17,17,10,4,4,4,4],     Z:[31,1,2,4,8,16,31],
  '0':[14,17,19,21,25,17,14],'1':[4,12,4,4,4,4,14],   '2':[14,17,1,6,8,16,31],
  '3':[31,2,4,6,1,17,14],   '4':[2,6,10,18,31,2,2],   '5':[31,16,30,1,1,17,14],
  '6':[6,8,16,30,17,17,14], '7':[31,1,2,4,8,8,8],     '8':[14,17,17,14,17,17,14],
  '9':[14,17,17,15,1,2,12],
  '.':[0,0,0,0,0,12,12],    ',':[0,0,0,0,12,12,8],    '!':[4,4,4,4,4,0,4],
  '?':[14,17,1,6,4,0,4],    ':':[0,12,12,0,12,12,0],  '-':[0,0,0,14,0,0,0],
  '=':[0,0,31,0,31,0,0],    '/':[1,1,2,4,8,16,16],    '"':[10,10,0,0,0,0,0],
  "'":[4,4,0,0,0,0,0],      '(':[2,4,8,8,8,4,2],      ')':[8,4,2,2,2,4,8],
  '+':[0,4,4,31,4,4,0],
  // Umlaute: Zeile 0 = zwei Punkte, Zeilen 1-6 = Basisbuchstabe ohne dessen
  // oberste Zeile (die durch die Punkte ersetzt wird) - passt so in die
  // vorhandene 7-Zeilen-Hoehe, ohne den Buchstabenkoerper zu stauchen.
  'Ä':[10,17,17,31,17,17,17], 'Ö':[10,17,17,17,17,17,14], 'Ü':[10,17,17,17,17,17,14],
  'ß':[14,17,18,30,17,17,30]
};

function drawChar(g, x, y, sc, c){
  ctx.fillStyle = c;
  for(let r=0;r<7;r++){
    const row = g[r]; if(!row) continue;
    let b = 4;
    while(b >= 0){                       // zusammenhaengende Pixel als ein Rect
      if(row & (1<<b)){
        let run = 1;
        while(b-run >= 0 && (row & (1<<(b-run)))) run++;
        ctx.fillRect(x + (4-b)*sc, y + r*sc, run*sc, sc);
        b -= run;
      } else b--;
    }
  }
}
function drawText(s, x, y, sc, c){
  for(let i=0;i<s.length;i++){
    const g = FONT[s[i]];
    if(g) drawChar(g, x + i*6*sc, y, sc, c);
  }
}
function textW(s, sc){ return s.length ? (s.length*6 - 1)*sc : 0; }
function alignX(s, x, sc, align){
  const w = textW(s, sc);
  return Math.round(align==='center' ? x - w/2 : align==='right' ? x - w : x);
}

// Kompatible Signatur (size -> Skalierung), mit Drop-Shadow
function txt(s, x, y, c, size, align){
  s = String(s).toUpperCase();
  const sc = (size||8) >= 16 ? 3 : (size||8) >= 10 ? 2 : 1;
  const ox = alignX(s, x, sc, align), oy = Math.round(y);
  drawText(s, ox+sc, oy+sc, sc, PAL.txtShadow);
  drawText(s, ox, oy, sc, c || PAL.txt);
}
// Headline-Text mit Outline (8 Richtungen) + optionalem Versatz-Sockel
function otxt(s, x, y, sc, c, oc, align){
  s = String(s).toUpperCase();
  const ox = alignX(s, x, sc, align), oy = Math.round(y);
  const o = Math.ceil(sc/2);
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++)
    if(dx||dy) drawText(s, ox+dx*o, oy+dy*o, sc, oc);
  drawText(s, ox, oy, sc, c);
}

const clouds = [];
for(let i=0;i<9;i++){
  const s = 0.7+((hash(i+9)%10)/10);
  clouds.push({x: i*190 + hash(i)%130, y: 10+(hash(i+50)%40), s, v: hash(i+3)%3,
               w: Math.round(34*s), h: Math.round(13*s)});
}

function drawSky(){
  px(0, 0, VW, VH, PAL.sky1);
  px(0, 0, VW, 50, PAL.sky2);
  px(0, 50, VW, 8, PAL.sky3);
  // Hoehen-Parallax: je hoeher ueber der Talsohle, desto tiefer rutschen die Huegel
  const alt = Math.max(0, (MAPH*TILE - VH) - cam.y);
  // Sonne mit Strahlenkranz (vorgerendert)
  ctx.drawImage(BG.sun, 253, 11);
  // Wolken (Parallax 0.15, 3 Formen)
  for(const cl of clouds){
    const cx = ((cl.x - cam.x*0.15 + gt*3) % 1700 + 1700) % 1700 - 60;
    if(cx < -cl.w || cx > VW+40) continue;
    ctx.drawImage(BG.clouds[cl.v], Math.round(cx), Math.round(cl.y + alt*0.06), cl.w, cl.h);
  }
  // Huegel-Parallax: 2 vorgerenderte, nahtlos kachelnde Streifen
  const fy = Math.round(alt*0.18), ny = Math.round(alt*0.35);
  let off = (cam.x*0.35) % BGW; if(off < 0) off += BGW;
  off = Math.round(off);
  ctx.drawImage(BG.far, -off, fy);
  ctx.drawImage(BG.far, BGW-off, fy);
  off = (cam.x*0.6) % BGW; if(off < 0) off += BGW;
  off = Math.round(off);
  ctx.drawImage(BG.near, -off, ny);
  ctx.drawImage(BG.near, BGW-off, ny);
  // Schneefall (Welt 3) - deterministisch aus hash+gt, kein Partikel-State
  if(PAL.snow){
    ctx.fillStyle = '#ffffff';
    for(let i=0;i<26;i++){
      const spd = 14 + (hash(i*7)%18);
      const sx = ((hash(i*13)%360) - cam.x*0.3 + Math.sin(gt*0.9 + i)*7);
      const sy = ((hash(i*29)%210) + gt*spd);
      ctx.fillRect(Math.round(((sx%360)+360)%360 - 20), Math.round(((sy%200)+200)%200 - 10),
                   i%3?1:2, i%3?1:2);
    }
  }
}

function drawTiles(){
  const c0 = Math.max(0, Math.floor(cam.x/TILE)), c1 = Math.min(MAPW-1, Math.ceil((cam.x+VW)/TILE));
  const camX = Math.round(cam.x), camY = Math.round(cam.y);
  // Zeilen auf den sichtbaren Ausschnitt begrenzen (-1 wegen 6px Gras-Ueberhang)
  const r0 = Math.max(0, Math.floor(camY/TILE) - 1), r1 = Math.min(MAPH-1, Math.ceil((camY+VH)/TILE));
  for(let c=c0; c<=c1; c++){
    const colX = c*TILE - camX;
    for(let r=r0; r<=r1; r++){
      const v = vgrid[r][c];
      if(v < 0) continue;
      const a = ATLAS[v];
      ctx.drawImage(a.cv, colX + a.ox, r*TILE - camY + a.oy);
    }
  }
}

function drawCheckpoint(){
  if(!checkpoint) return;
  const x = Math.round(checkpoint.x - cam.x), gy = Math.round(checkpoint.y - cam.y);
  if(x < -24 || x > VW+24) return;
  const H = 26, act = checkpoint.active;
  // Mast + Sockel + Knauf
  px(x+4, gy-2, 6, 2, PAL.rockDark);
  px(x+6, gy-H, 2, H-1, PAL.rock);
  px(x+6, gy-H, 1, H-1, PAL.rockHi);
  px(x+5, gy-H-2, 4, 2, act ? PAL.gold : PAL.rockDark);
  if(act) px(x+5, gy-H-2, 1, 1, PAL.goldHi);
  // Flagge: hisst sich beim Aktivieren hoch
  const a = act ? Math.min(1, checkpoint.animT/0.6) : 0;
  const fy = gy - 9 - a*(H-12);
  const wob = act ? Math.round(Math.sin(gt*6)) : 0;
  const c1 = act ? PAL.bow : PAL.rock, c2 = act ? PAL.bowDark : PAL.rockDark;
  px(x+8, fy, 7, 5, c1);
  px(x+8, fy, 7, 1, act ? PAL.bowHi : PAL.rockHi);
  px(x+13+wob, fy+1, 2, 3, c1);
  px(x+8, fy+4, 7, 1, c2);
  if(act && checkpoint.animT < 1.2) txt('CHECKPOINT!', x+7, gy-H-14, '#fff', 7, 'center');
}

// Zielflagge: Ende eines normalen Levels (Welt-Finale hat stattdessen den Kaefig)
function drawGoal(){
  if(!goal) return;
  const x = Math.round(goal.x - cam.x), y = Math.round(goal.y - cam.y);
  if(x < -30 || x > VW+30) return;
  px(x+1, y+goal.h-2, 10, 2, PAL.rockDark);          // Sockel
  px(x+5, y, 2, goal.h-2, PAL.rock);                 // Mast
  px(x+5, y, 1, goal.h-2, PAL.rockHi);
  px(x+4, y-3, 4, 3, PAL.gold);                      // Knauf
  px(x+4, y-3, 1, 1, PAL.goldHi);
  const wob = Math.round(Math.sin(gt*5));            // wehende Zielfahne
  px(x+7, y+2, 9, 7, PAL.gold);
  px(x+7, y+2, 9, 2, PAL.goldHi);
  px(x+15+wob, y+3, 2, 5, PAL.gold);
  px(x+7, y+8, 9, 1, PAL.goldDk);
  px(x+9, y+4, 2, 2, PAL.heart);                     // kleines Herz-Emblem
  px(x+12, y+4, 2, 2, PAL.heart);
  px(x+10, y+6, 3, 1, PAL.heart);
}

function drawCollectibles(){
  for(const it of collectibles){
    if(it.got) continue;
    const x = it.x - cam.x, y = it.y - cam.y + Math.sin(gt*4 + it.x*0.05)*1.5;
    if(x < -12 || x > VW+12) continue;
    if(it.kind === 'salad'){
      px(x, y+1, 7, 5, PAL.salad);
      px(x+1, y, 5, 2, PAL.salad);
      px(x+1, y+1, 2, 1, PAL.saladHi);           // Blattglanz
      px(x+3, y+1, 1, 5, PAL.saladDark);         // Mittelader
      px(x+1, y+3, 2, 1, PAL.saladDark);         // Seitenadern
      px(x+5, y+2, 1, 1, PAL.saladDark);
      px(x+4, y+4, 1, 1, PAL.saladDark);
      // leichtes Funkeln (deterministisch)
      if(((gt*2 + it.x*0.31) % 4) < 0.3) px(x+1+((it.x>>3)%4), y, 1, 1, '#ffffff');
    } else {
      // Sanduhr-Splitter (Diamant) mit Kante + wanderndem Glanzpunkt
      px(x+2, y, 3, 2, PAL.shardHi);
      px(x+1, y+2, 5, 4, PAL.shard);
      px(x, y+3, 7, 2, PAL.shard);
      px(x+2, y+6, 3, 3, PAL.shard);
      px(x+3, y+9, 1, 2, PAL.shardHi);
      px(x+2, y+2, 1, 2, PAL.shardHi);
      px(x+5, y+5, 1, 2, PAL.shardDk);           // dunkle Facette
      px(x+4, y+7, 1, 2, PAL.shardDk);
      const gp = ((gt*1.4 + it.x*0.11) % 1.6);   // Glitzer wandert durch
      if(gp < 1){
        const gy2 = Math.floor(gp*9);
        px(x+1+(gy2%4), y+gy2, 1, 2, '#ffffff');
      }
    }
  }
}

function drawCrow(e){
  const x = Math.round(e.x - cam.x), y = Math.round(e.y - cam.y);
  if(x < -30 || x > VW+30) return;
  const flap = Math.sin(e.t*10) > 0 ? 1 : 0;
  const dir = e.dir || 1;
  if(e.type === 'boss'){
    const fl = e.flashT > 0 && Math.floor(gt*20)%2 === 0;
    const B = fl ? '#ffffff' : PAL.crow, W = fl ? '#ffffff' : PAL.crowWing;
    const D = fl ? '#ffffff' : PAL.crowDark;
    const hx = dir>0 ? 14 : 0;
    // Schwanzfedern
    px(x+(dir>0?-4:22), y+7, 5, 3, D);
    px(x+(dir>0?-6:26), y+8, 3, 2, B);
    px(x, y+4, 22, 16, B);                     // Koerper
    px(x+3, y+15, 4, 1, D);                    // Federstruktur Brust
    px(x+9, y+17, 4, 1, D);
    px(x+15, y+15, 4, 1, D);
    px(x+2, y+8-flap*2, 18, 5, W);             // Fluegel (2 Frames)
    px(x+3, y+11-flap*2, 3, 2, D);             // Federkerben
    px(x+8, y+11-flap*2, 3, 2, D);
    px(x+13, y+11-flap*2, 3, 2, D);
    px(x+18, y+9-flap*2, 2, 2, D);             // Fluegelspitze
    // Federkragen zwischen Kopf und Koerper
    const kx = dir>0 ? 12 : 8;
    px(x+kx, y+3, 2, 3, W); px(x+kx, y+6, 2, 3, D); px(x+kx, y+9, 2, 2, W);
    px(x+hx, y, 10, 9, B);                     // Kopf
    px(x+(dir>0?22:-4), y+3, 4, 3, PAL.beak);
    px(x+(dir>0?22:-3), y+5, 3, 1, '#c77f22'); // Schnabelschatten
    px(x+(dir>0?18:3), y+2, 3, 3, '#ff4444');  // zorniges Auge
    px(x+(dir>0?19:4), y+3, 1, 1, '#ffffff');  // Augen-Glanz
    px(x+(dir>0?17:2), y, 3, 1, D);            // zornige Braue (schraeg)
    px(x+(dir>0?19:1), y+1, 2, 1, D);
    // GOLDENE KRONE
    px(x+hx+1, y-3, 8, 3, PAL.gold);
    px(x+hx+1, y-5, 2, 2, PAL.gold);
    px(x+hx+4, y-6, 2, 3, PAL.gold);
    px(x+hx+7, y-5, 2, 2, PAL.gold);
    px(x+hx+1, y-5, 1, 1, PAL.goldHi);
    px(x+hx+4, y-6, 1, 1, PAL.goldHi);
    px(x+hx+4, y-2, 2, 1, PAL.heart);          // Rubin
    px(x+4, y+20, 3, 3, PAL.beak); px(x+14, y+20, 3, 3, PAL.beak);
    // HP-Anzeige
    for(let i=0;i<3;i++) px(x+2+i*7, y-10, 5, 4, i < e.hp ? PAL.heart : '#00000044');
  } else if(e.type === 'sleeper'){
    px(x, y+6, 3, 2, PAL.crowDark);            // Schwanz
    px(x+1, y+3, 12, 10, PAL.crow);
    px(x+2, y+6, 10, 3, PAL.crowWing);
    px(x+3, y+8, 2, 1, PAL.crowDark);          // Federkerben
    px(x+7, y+8, 2, 1, PAL.crowDark);
    px(x+3, y+11, 3, 1, PAL.crowDark);         // Brustfedern
    px(x+(e.awake?8:7), y, 7, 7, PAL.crow);
    px(x+13, y+2, 3, 2, PAL.beak);
    if(e.awake){ px(x+11, y+1, 2, 2, '#ff4444'); px(x+11, y+1, 1, 1, '#fff'); }
    else {
      px(x+10, y+2, 3, 1, '#888'); // geschlossenes Auge
      txt('z', x+13, y-10 + Math.sin(e.t*2)*2, '#ffffffcc', 7);
    }
    px(x+3, y+13, 2, 2, PAL.beak); px(x+9, y+13, 2, 2, PAL.beak);
  } else {
    const bb = flap ? 0 : 1;                   // 2-Frame-Hopser
    px(x+(dir>0?-2:12), y+5+bb, 4, 2, PAL.crowDark); // Schwanzfedern
    px(x+1, y+3+bb, 12, 9, PAL.crow);
    px(x+(dir>0?9:2), y+9+bb, 3, 1, PAL.crowDark);   // Brustfedern
    px(x+2, y+5-flap+bb, 9, 4, PAL.crowWing);
    px(x+3, y+8-flap+bb, 2, 1, PAL.crowDark);        // Federkerben am Fluegel
    px(x+6, y+8-flap+bb, 2, 1, PAL.crowDark);
    px(x+9, y+7-flap+bb, 2, 2, PAL.crowDark);        // Fluegelspitze
    px(x+(dir>0?7:0), y+bb, 7, 7, PAL.crow);
    px(x+(dir>0?13:-2), y+2+bb, 3, 2, PAL.beak);
    px(x+(dir>0?10:2), y+1+bb, 2, 2, '#ffd447');
    px(x+(dir>0?11:2), y+1+bb, 1, 1, PAL.crowDark);  // Pupille
    px(x+3, y+12, 2, 2, PAL.beak); px(x+9, y+12, 2, 2, PAL.beak);
  }
}

    px(x-5, y-1+dy, 2, 6, c2);

    px(x+8, y-3+dy, 2, 3, c2);          // Ohren
    px(x+11, y-3+dy, 2, 3, c2);
  } else if(W.buddyKind === 'bunny'){
    px(x+8, y-6+dy, 2, 7, c1);          // lange Loeffel
    px(x+11, y-6+dy, 2, 7, c1);
    px(x+8, y-5+dy, 1, 4, PAL.bowHi);   // Innenohr
    px(x+11, y-5+dy, 1, 4, PAL.bowHi);
    px(x-2, y+3+dy, 3, 3, '#ffffff');   // Puschelschwanz
  } else {
    px(x-4, y+4+dy, 5, 2, c2);          // flacher Gecko-Schwanz
  }

  px(x+1, y+8+dy, 2, 2, c2); px(x+6, y+8+dy, 2, 2, c2);
}

function drawShelly(){
  if(P.invulnT > 0 && Math.floor(gt*12)%2 === 0 && state === 'play') return; // Blinken
  const x = Math.round(P.x - cam.x), y = Math.round(P.y - cam.y);
  const cxm = x + P.w/2;
  const boardY = y + P.h - 4;
  // Bei Linksfahrt (nach Kickturn) den ganzen Sprite spiegeln
  ctx.save();
  if(P.dir < 0){ ctx.translate(2*cxm + 1, 0); ctx.scale(-1, 1); }
  // Skateboard (mit Nose/Tail-Kick und Radnaben)
  px(cxm-11, boardY-1, 2, 2, PAL.board);
  px(cxm+9, boardY-1, 2, 2, PAL.board);
  px(cxm-10, boardY, 20, 3, PAL.board);
  px(cxm-8, boardY, 16, 1, PAL.boardHi);
  px(cxm-7, boardY+3, 3, 2, PAL.wheel);
  px(cxm+4, boardY+3, 3, 2, PAL.wheel);
  px(cxm-6, boardY+3, 1, 1, '#777');
  px(cxm+5, boardY+3, 1, 1, '#777');
  if(P.vx > 130){ // Speed-Linien (animiert, skaliert mit Tempo)
    const k = (P.vx-130)/(MAX_SPD-130);
    const off = Math.round((gt*60)%8);
    px(x-6-off, boardY-2, 4+k*6, 1, '#ffffff88');
    px(x-10-off, boardY-8, 5+k*7, 1, '#ffffff66');
    px(x-4-off, boardY-13, 3+k*5, 1, '#ffffff44');
  }
  if(P.rolling){
    // eingerollter Panzer mit sichtbarem Spiral-Muster
    const cy = boardY - 6;
    ctx.fillStyle = PAL.shell;
    ctx.beginPath(); ctx.arc(cxm, cy, 6.5, 0, 7); ctx.fill();
    ctx.fillStyle = PAL.shellDark;
    ctx.beginPath(); ctx.arc(cxm, cy, 6.5, P.rollA, P.rollA+1.1); ctx.lineTo(cxm, cy); ctx.fill();
    ctx.beginPath(); ctx.arc(cxm, cy, 6.5, P.rollA+3.1, P.rollA+4.2); ctx.lineTo(cxm, cy); ctx.fill();
    // Spirale rotiert mit
    for(let k=0;k<4;k++){
      const a = P.rollA + k*1.9, rad = 2 + k*1.1;
      px(cxm + Math.cos(a)*rad - 1, cy + Math.sin(a)*rad - 1, 2, 2, k%2 ? PAL.shellDark : PAL.shellPlate);
    }
    px(cxm-1, cy-1, 1, 1, PAL.shellDark);   // Nabe
    px(cxm-2, cy-3, 3, 2, PAL.shellHi);
    px(cxm+3, cy-6, 3, 2, PAL.bow); // Schleife blitzt hervor
  } else {
    const bob = P.grounded ? Math.round(Math.sin(gt*13))* 1 : 0;
    const lf = P.grounded ? Math.floor(gt*12)%3 : 1;       // Paddel-Beine, 3 Frames
    // Beine (Paddel-Animation)
    px(x+2, boardY-3-(lf===0?1:0), 3, 4+(lf===0?1:0), PAL.bodyDark);
    px(x+8, boardY-3-(lf===2?1:0), 3, 4+(lf===2?1:0), PAL.bodyDark);
    // Hals + Bauchpanzer-Ton
    px(x+9, y+8+bob, 3, 3, PAL.body);
    px(x+2, y+13+bob, 8, 1, PAL.belly);
    // Panzer
    px(x-1, y+4+bob, 12, 9, PAL.shell);
    px(x, y+3+bob, 10, 3, PAL.shellHi);
    px(x+1, y+11+bob, 9, 2, PAL.shellDark);
    // Platten-Muster (Hexagon-Andeutung, 2 Reihen versetzt)
    px(x+1, y+6+bob, 3, 3, PAL.shellPlate);
    px(x+5, y+6+bob, 3, 3, PAL.shellPlate);
    px(x+9, y+6+bob, 1, 3, PAL.shellPlate);
    px(x+3, y+9+bob, 3, 2, PAL.shellPlate);
    px(x+7, y+9+bob, 2, 2, PAL.shellPlate);
    px(x+4, y+6+bob, 1, 3, PAL.shellDark);      // Naehte
    px(x+8, y+6+bob, 1, 3, PAL.shellDark);
    px(x+1, y+6+bob, 1, 1, PAL.shellHi);        // Plattenglanz
    px(x+5, y+6+bob, 1, 1, PAL.shellHi);
    // Kopf (nach rechts)
    px(x+9, y+1+bob, 7, 7, PAL.body);
    px(x+13, y+3+bob, 2, 2, '#fff');            // Auge
    px(x+14, y+3+bob, 1, 2, '#123');            // Pupille
    px(x+14, y+3+bob, 1, 1, '#cfeaff');         // Augen-Highlight
    px(x+10, y+5+bob, 2, 1, PAL.bowHi);         // Wange
    px(x+11, y+6+bob, 3, 1, PAL.bodyDark);      // Laecheln
    // rosa Schleife (2 Toene)
    px(x, y+bob, 3, 3, PAL.bow); px(x+4, y+bob, 3, 3, PAL.bow);
    px(x, y+bob, 3, 1, PAL.bowHi); px(x+4, y+bob, 3, 1, PAL.bowHi);
    px(x+3, y+1+bob, 1, 1, PAL.bowDark);
    px(x+1, y+2+bob, 1, 1, PAL.bowDark); px(x+5, y+2+bob, 1, 1, PAL.bowDark);
    // Paddel-Arm (3-Frame-Animation nach Tipp)
    const pd = gt - P.paddleT;
    if(pd < 0.3){
      if(pd < 0.1){ px(x+6, y+7+bob, 4, 3, PAL.body); px(x+9, y+6+bob, 2, 2, PAL.body); }
      else if(pd < 0.2){ px(x+6, y+10+bob, 5, 3, PAL.body); }
      else { px(x+5, y+12+bob, 3, 4, PAL.body); px(x+7, y+14+bob, 3, 2, PAL.body); }
    } else {
      px(x+5, y+11+bob, 3, 3, PAL.body);
    }
  }
  ctx.restore();
}

  const I = WORLDS[curWorld].intro;
  const p = panel(280, 140);
  txt(I.head, VW/2, p.y+8, '#8a2be2', 10, 'center');
  I.lines.forEach((l,i)=>txt(l, VW/2, p.y+26+i*11, '#33424e', 8, 'center'));
  txt(I.tips[0], VW/2, p.y+108, '#2e7d32', 8, 'center');
  txt(I.tips[1], VW/2, p.y+119, '#2e7d32', 8, 'center');
  if(Math.floor(gt*1.6)%2===0) txt('- Tippen zum Start -', VW/2, p.y+132, '#e04a3a', 8, 'center');
}

// kleines Schloss-Icon fuer gesperrte Welten/Level
function drawLock(x, y, c){
  px(x+1, y, 6, 3, c); px(x, y+1, 2, 3, c); px(x+6, y+1, 2, 3, c);   // Buegel
  px(x-1, y+4, 10, 7, c);                                            // Koerper
  px(x+3, y+6, 2, 3, '#00000055');                                   // Schluesselloch
}
// Mini-Splitter (Stern-Ersatz) fuer die Level-Buttons
function drawMiniShard(x, y, on){
  px(x+1, y, 4, 2, on?PAL.shardHi:'#00000033');
  px(x, y+2, 6, 4, on?PAL.shard:'#00000033');
  px(x+1, y+6, 4, 2, on?PAL.shard:'#00000033');
  if(on) px(x+1, y+2, 1, 2, PAL.shardHi);
}

// Welt-Auswahl: 3 Karten
function drawWorldSel(){
  drawSky();
  px(0, 150, VW, 30, PAL.grass); px(0, 150, VW, 3, PAL.grassLip);
  otxt('WÄHLE DEINE WELT', VW/2, 12, 2, '#fff', '#1c4a26', 'center');
  for(let i=0;i<WORLDS.length;i++){
    const W = WORLDS[i];
    const x = 18 + i*98, y = 40, w = 88, h = 96;
    const sel = i === selW, open = isUnlocked(i, 0);
    px(x-3, y-3, w+6, h+6, sel ? PAL.gold : '#1f3a24');
    px(x-1, y-1, w+2, h+2, sel ? PAL.goldHi : '#2e4a2e');
    const T = Object.assign({}, PAL_BASE, W.theme);
    px(x, y, w, h, T.sky1);
    px(x, y+28, w, 12, T.hillFar);
    px(x, y+38, w, 16, T.hillNear);
    px(x, y+50, w, 12, T.grass);
    px(x, y+50, w, 2, T.grassLip);
    if(i === 0){                              // Wiesental: Blume + Sonne
      px(x+14, y+42, 3, 8, T.grass);
      px(x+12, y+38, 6, 5, PAL_BASE.flower); px(x+14, y+40, 2, 2, PAL.sun);
      px(x+68, y+6, 8, 8, PAL.sun);
    } else if(i === 1){                       // Pilzwald: Pilz
      px(x+14, y+38, 6, 14, T.pebbleHi);
      px(x+7, y+31, 20, 8, PAL.shroomCap);
      px(x+10, y+27, 14, 5, PAL.shroomCap);
      px(x+10, y+33, 3, 3, '#fff'); px(x+19, y+30, 3, 3, '#fff');
    } else {                                  // Frostklippen: Schneeflocke + Eiszapfen
      px(x+66, y+8, 2, 10, '#fff'); px(x+62, y+12, 10, 2, '#fff');
      px(x+63, y+9, 2, 2, '#fff'); px(x+69, y+9, 2, 2, '#fff');
      px(x+63, y+15, 2, 2, '#fff'); px(x+69, y+15, 2, 2, '#fff');
      px(x+12, y+50, 3, 6, PAL.ice); px(x+18, y+50, 3, 9, PAL.ice); px(x+24, y+50, 3, 5, PAL.ice);
    }
    if(!open){                                // gesperrt: abdunkeln + Schloss
      ctx.fillStyle = 'rgba(20,25,35,0.62)'; ctx.fillRect(x, y, w, h);
      drawLock(x+w/2-4, y+30, '#cfd6de');
    }
    txt(W.sub, x+w/2, y+66, '#fff', 8, 'center');
    txt(W.name, x+w/2, y+76, open ? '#ffe9a0' : '#9aa4ae', 7, 'center');
    if(worldDone(i)) txt('FERTIG!', x+w/2, y+5, '#7ed957', 7, 'center');
    else if(open){
      const n = prog[i].filter(p=>p.done).length;
      txt(n + '/' + WORLDS[i].levels.length, x+w/2, y+86, '#ffffffcc', 7, 'center');
    }
  }
  if(Math.floor(gt*1.6)%2===0) txt('TIPPEN oder PFEILE + LEER', VW/2, 154, '#fff', 8, 'center');
  txt('FORTSCHRITT NUR IM SPEICHER (PROTOTYP)', VW/2, 168, '#ffffff88', 6, 'center');
}

// Level-Auswahl innerhalb einer Welt: 3 grosse Buttons mit Splitter-Bestwert
function drawLevelSel(){
  drawSky();
  px(0, 150, VW, 30, PAL.grass); px(0, 150, VW, 3, PAL.grassLip);
  const W = WORLDS[selW];
  otxt(W.sub + ': ' + W.name, VW/2, 12, 2, '#fff', '#1c4a26', 'center');
  // Zurueck-Button
  px(6, 8, 40, 18, '#1f3a24'); px(8, 10, 36, 14, '#2e4a2e');
  txt('<', 16, 13, PAL.goldHi, 9); txt('ZUR.', 22, 14, '#fff', 7);
  for(let i=0;i<W.levels.length;i++){
    const L = W.levels[i];
    const x = 44 + i*84, y = 60, w = 64, h = 72;
    const sel = i === selL, open = isUnlocked(selW, i), p = prog[selW][i];
    px(x-3, y-3, w+6, h+6, sel ? PAL.gold : '#1f3a24');
    px(x-1, y-1, w+2, h+2, sel ? PAL.goldHi : '#2e4a2e');
    px(x, y, w, h, open ? '#f7efd2' : '#8a8f96');
    px(x, y, w, 2, open ? '#fffbe8' : '#9aa0a8');
    if(open){
      otxt(String(i+1), x+w/2, y+8, 3, '#2e7d32', '#1c4a26', 'center');
      for(let s=0;s<3;s++) drawMiniShard(x+w/2-14+s*10, y+36, s < p.best);
      if(p.done) txt('OK!', x+w/2, y+52, '#2e9e46', 8, 'center');
      else txt(i === 2 ? 'FINALE' : '', x+w/2, y+53, '#8a5a33', 6, 'center');
    } else {
      drawLock(x+w/2-4, y+18, '#5c636b');
      txt('GESPERRT', x+w/2, y+52, '#5c636b', 6, 'center');
    }
    txt(L.name, x+w/2, y+h+4, open ? '#fff' : '#ffffff88', 6, 'center');
  }
  if(Math.floor(gt*1.6)%2===0) txt('TIPPEN oder PFEILE + LEER', VW/2, 154, '#fff', 8, 'center');
}

function drawGameOver(){
  px(0, 0, VW, VH, 'rgba(20,15,35,0.78)');
  otxt('MIST!', VW/2, 42, 3, '#ff5a6a', '#4a0f18', 'center');
  txt('Corvos Krähen lachen dich aus...', VW/2, 80, '#ddd', 8, 'center');
  txt('"Zu langsam! Kraah!"', VW/2, 94, '#aaa', 8, 'center');
  if(Math.floor(gt*1.6)%2===0) txt('TIPPEN = Nochmal versuchen', VW/2, 130, '#fff', 9, 'center');
}

function drawPause(){
  px(0, 0, VW, VH, 'rgba(20,30,40,0.62)');
  otxt('PAUSE', VW/2, 58, 3, '#ffffff', '#20303c', 'center');
  if(Math.floor(gt*1.6)%2===0) txt('Tippen zum Weiterspielen', VW/2, 96, '#ddd', 9, 'center');
}

function drawWin(){
  const W = WORLDS[curWorld], finale = !!cage;
  px(0, 0, VW, VH, 'rgba(20,40,25,0.75)');
  if(finale){
    otxt('GERETTET!', VW/2, 26, 3, '#7ed957', '#173a1f', 'center');
    drawBuddy(VW/2-6, 58, gt*5);
    txt(W.win[0], VW/2, 80, '#eee', 8, 'center');
    txt(W.win[1], VW/2, 91, '#eee', 8, 'center');
  } else {
    otxt('GESCHAFFT!', VW/2, 26, 3, '#7ed957', '#173a1f', 'center');
    txt(W.sub + '-' + (curLvl+1) + ': ' + W.levels[curLvl].name, VW/2, 62, PAL.goldHi, 9, 'center');
    txt('Weiter geht die Rettungsfahrt!', VW/2, 88, '#eee', 8, 'center');
  }
  // Statistik-Zeilen mit Trennlinie
  px(VW/2-70, 106, 140, 1, '#ffffff33');
  txt('Salat: ' + saladCount + ' / ' + totalSalad, VW/2, 113, '#8fe14f', 9, 'center');
  txt('Splitter: ' + shardCount + ' / ' + totalShards, VW/2, 125, PAL.shard, 9, 'center');
  txt('Zeit: ' + fmtTime(playT), VW/2, 137, '#fff', 9, 'center');
  px(VW/2-70, 149, 140, 1, '#ffffff33');
  const nextL = curLvl + 1 < W.levels.length, nextW = curWorld + 1 < WORLDS.length;
  const prompt = nextL ? 'TIPPEN = WEITER ZU LEVEL ' + (curWorld+1) + '-' + (curLvl+2)
               : nextW ? 'TIPPEN = WEITER ZU ' + WORLDS[curWorld+1].sub
               : 'TIPPEN = WELT-AUSWAHL';
  if(Math.floor(gt*1.6)%2===0) txt(prompt, VW/2, 158, '#fff', 8, 'center');
}

function render(){
  if(state === 'title'){ drawTitle(); return; }
  if(state === 'worldsel'){ drawWorldSel(); drawMuteIcon(); return; }
  if(state === 'levelsel'){ drawLevelSel(); drawMuteIcon(); return; }
  if(state === 'intro'){ drawIntro(); drawMuteIcon(); return; }

  // Welt (auch als Hintergrund fuer Overlays)
  ctx.save();
  if(cam.shake > 0) ctx.translate((Math.random()-0.5)*cam.shake, (Math.random()-0.5)*cam.shake);
  drawSky();
  drawTiles();
  drawCheckpoint();
  drawGoal();
  drawCage();
  drawCollectibles();
  for(const e of enemies) if(e.alive) drawCrow(e);
  if(state === 'rescue' && zip) drawBuddy(zip.x - cam.x, zip.y - cam.y, zip.hop);
  drawShelly();
  drawParticles();
  drawHints();
  ctx.restore();
  // sanfter Screen-Flash beim Splitter
  if(flashT > 0){
    ctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.55, flashT*3.2).toFixed(3) + ')';
    ctx.fillRect(0, 0, VW, VH);
  }
  drawHUD();

  // Level-Banner beim Start (Welt X-Y + Name)
  if(state === 'play' && playT < 1.7){
    otxt('WELT ' + (curWorld+1) + '-' + (curLvl+1), VW/2, 30, 2, '#ffffff', '#1c4a26', 'center');
    txt(WORLDS[curWorld].levels[curLvl].name, VW/2, 48, PAL.goldHi, 8, 'center');
  }

  if(state === 'gameover') drawGameOver();
  else if(state === 'win') drawWin();
  else if(state === 'pause') drawPause();
  else if(state === 'rescue') otxt(WORLDS[curWorld].buddy + ' IST FREI!', VW/2, 38, 2, PAL.goldHi, '#5c3a06', 'center');
  else if(state === 'clear') otxt('GESCHAFFT!', VW/2, 38, 2, PAL.goldHi, '#5c3a06', 'center');
  drawMuteIcon();
}

// ============================================================
// LOOP + RESIZE
// ============================================================
let lastT = 0;
function loop(ms){
  const t = ms/1000;
  let dt = Math.min(0.05, t - lastT || 0.016);
  lastT = t; gt += dt;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function resize(){
  const s = Math.min(innerWidth/VW, innerHeight/VH);
  cvs.style.width = Math.floor(VW*s) + 'px';
  cvs.style.height = Math.floor(VH*s) + 'px';
}
addEventListener('resize', resize);

makeAtlas(); buildBG();
buildLevel(); buildHints(); resetEnemies();
respawnPlayer(); P.invulnT = 0;
resize();
requestAnimationFrame(loop);

// Debug-Zugriff (Prototyp) - G.unlockAll() schaltet alle Level frei
window.G = { P, get state(){return state;}, set state(s){state=s;}, get grid(){return grid;},
  get enemies(){return enemies;}, get hearts(){return hearts;}, cam, startRun, startLevel,
  get collectibles(){return collectibles;}, get cage(){return cage;}, get goal(){return goal;},
  get checkpoint(){return checkpoint;}, get curWorld(){return curWorld;}, get curLvl(){return curLvl;},
  get MAPH(){return MAPH;}, get MAPW(){return MAPW;}, applyTheme, WORLDS, prog,
  unlockAll(){ prog.forEach(w => w.forEach(l => l.done = true)); } };
</script>
